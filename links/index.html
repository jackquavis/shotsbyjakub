<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jakub Chojnowski - Links</title>
  <meta name="description" content="Connect with Jakub Chojnowski, view the portfolio, book a shoot, or buy prints.">
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="/dist/assets/favicon.ico" />
  <link rel="stylesheet" href="/dist/output.css" />
  <link rel="stylesheet" href="styles.css" />
  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <!-- Start - Fonts -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nothing+You+Could+Do&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Signika:wght@400;700&display=swap" rel="stylesheet">
  <!-- End - Fonts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      content: ["./dist/*.{html,js}"],
      theme: {
        extend: {
          fontFamily: {
            'nothingyoucoulddo': ['Nothing You Could Do', 'cursive'],
            'signika': ['Signika', 'sans-serif'],
          },
        },
      },
      plugins: [],
    }
  </script>
</head>

<body class="dark:bg-black bg-white h-screen text-black dark:text-white px-5 md:px-20 opacity-0 animate-fade-in transition duration-500 flex flex-col">
  <!-- Navbar -->
  <header class="flex w-full pt-10 pb-5">
    <nav id="nav" x-data="{ open: false }" role="navigation" class="w-full">
      <div class="container mx-auto flex flex-wrap items-center lg:flex-nowrap">
        <div class="mr-4 lg:mr-8">
          <a href="index.html" class="text-2xl font-signika font-bold tap-highlight-transparent">JAKUB CHOJNOWSKI</a>
        </div>
        
        <div class="ml-auto lg:hidden flex items-center justify-start">
          <button class="tap-highlight-transparent text-black dark:text-white w-5 h-5 relative focus:outline-none" @click="open = !open">
            <span class="sr-only">Open main menu</span>
            <span class="block w-5 absolute left-1/2 top-1/2 transform -translate-x-1/2 -translate-y-1/2">
              <span aria-hidden="true" class="block absolute h-0.5 w-5 bg-current transform transition duration-500 ease-in-out" :class="{'rotate-45': open,' -translate-y-1.5': !open }"></span>
              <span aria-hidden="true" class="block absolute  h-0.5 w-5 bg-current transform transition duration-500 ease-in-out" :class="{'opacity-0': open } "></span>
              <span aria-hidden="true" class="block absolute  h-0.5 w-5 bg-current transform transition duration-500 ease-in-out" :class="{'-rotate-45': open, ' translate-y-1.5': !open}"></span>
            </span>
          </button>
        </div>
        
        <div id="menu" 
             class="w-full overflow-hidden transition-all ease-out duration-500 lg:transition-none lg:w-auto lg:flex-grow lg:flex lg:items-center lg:max-h-full"
             :class="open ? 'max-h-96' : 'max-h-0'">
          <ul id="ulMenu" class="flex flex-col duration-300 ease-out mt-5 pb-4 lg:pb-0 lg:space-x-5 sm:transition-none lg:flex-row lg:items-center lg:ml-auto lg:mt-0 lg:pt-0 lg:border-0">
            <li class="group transition duration-300">
              <a href="/" class="font-signika text-2xl tap-highlight-transparent">PORTFOLIO
                <span class="hidden lg:block max-w-0 group-hover:max-w-full transition-all duration-500 h-0.5 bg-black dark:bg-white"></span>
              </a>
            </li>
            <li class="group transition duration-300">
              <a href="/about-me/" class="font-signika text-2xl tap-highlight-transparent">ABOUT ME
                <span class="hidden lg:block max-w-0 group-hover:max-w-full transition-all duration-500 h-0.5 bg-black dark:bg-white"></span>
              </a>
            </li>
            <li class="group transition duration-300">
              <a href="/contact/" class="font-signika text-2xl tap-highlight-transparent">CONTACT
                <span class="hidden lg:block max-w-0 group-hover:max-w-full transition-all duration-500 h-0.5 bg-black dark:bg-white"></span>
              </a>
            </li>
            <li class="group transition duration-300">
              <a href="/links/" class="font-signika text-2xl tap-highlight-transparent">LINKS
                <span class="hidden lg:block max-w-0 group-hover:max-w-full transition-all duration-500 h-0.5 bg-black dark:bg-white"></span>
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <!-- Content (Link Tree) -->
  <main class="container mx-auto flex-grow flex flex-col items-center justify-center py-12">
    <!-- Profile Image & Title -->
    <div class="flex flex-col items-center mb-10">
      <img src="/dist/assets/About_Me_Photo.jpg" alt="Jakub Chojnowski" class="w-32 h-32 rounded-full object-cover shadow-lg border-2 border-gray-100 dark:border-neutral-800 mb-4" />
      <h1 class="text-3xl font-signika font-bold">@jackquoob</h1>
      <p class="text-xl font-nothingyoucoulddo mt-2 text-gray-600 dark:text-gray-300">behind the camera</p>
    </div>

    <!-- Link Buttons -->
    <div class="w-full max-w-md flex flex-col space-y-4 px-4">
      
      <!-- Main Portfolio Link -->
      <a href="/" class="group flex items-center justify-center p-4 bg-gray-50 dark:bg-neutral-900 border border-gray-300 dark:border-neutral-800 rounded-lg shadow-sm hover:scale-105 hover:bg-black hover:text-white dark:hover:bg-white dark:hover:text-black transition-all duration-300">
        <span class="font-signika text-xl font-bold">PORTFOLIO</span>
      </a>

      <!-- Instagram Link -->
      <a href="https://www.instagram.com/jackquoob/" target="_blank" rel="noreferrer" class="group flex items-center justify-center p-4 bg-gray-50 dark:bg-neutral-900 border border-gray-300 dark:border-neutral-800 rounded-lg shadow-sm hover:scale-105 hover:bg-black hover:text-white dark:hover:bg-white dark:hover:text-black transition-all duration-300">
        <span class="font-signika text-xl font-bold">INSTAGRAM</span>
      </a>

      <!-- Future Booking Site Link -->
      <a href="#" class="group flex items-center justify-center p-4 bg-gray-50 dark:bg-neutral-900 border border-gray-300 dark:border-neutral-800 rounded-lg shadow-sm hover:scale-105 hover:bg-black hover:text-white dark:hover:bg-white dark:hover:text-black transition-all duration-300">
        <span class="font-signika text-xl font-bold">BOOK A SHOOT</span>
      </a>

      <!-- Future Prints Shop Link -->
      <a href="#" class="group flex items-center justify-center p-4 bg-gray-50 dark:bg-neutral-900 border border-gray-300 dark:border-neutral-800 rounded-lg shadow-sm hover:scale-105 hover:bg-black hover:text-white dark:hover:bg-white dark:hover:text-black transition-all duration-300">
        <span class="font-signika text-xl font-bold">BUY PRINTS</span>
      </a>

    </div>
  </main>

  <!-- Footer -->

    <div class="max-w-screen-xl py-10 mx-auto">
      <div class="grid grid-cols-1 gap-8 text-center mx-auto">
        <div>
          <div class="flex mx-auto">
            <div class="mx-auto space-x-6 flex mt-4 text-gray-600 dark:text-gray-300">
              <a class="transition duration-300 hover:opacity-75" href="https://www.instagram.com/jackquoob/" target="_blank" rel="noreferrer">
                <span class="sr-only"> Instagram </span>
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">

                </svg>
              </a>
            </div>
          </div>
        </div>
      </div>
      <p class="mt-8 text-xs text-gray-600 dark:text-gray-300 text-center">
        © 2026 Jakub Chojnowski
      </p>
    </div>
  </footer>

  <script src="/dist/fade_in.js"></script>
  <script src="/dist/menu.js"></script>
</body>

</html>
